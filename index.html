<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 玩家性格分析與遊戲排行榜</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 基礎設定 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b2838; color: #c7d5e0; text-align: center; padding: 20px; margin: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background-color: #2a475e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
        h2 { color: #ffffff; margin-top: 0; font-size: 28px; letter-spacing: 1px; }
        .input-group { margin-bottom: 25px; }
        input { padding: 15px; width: 60%; box-sizing: border-box; border: 2px solid #171a21; border-radius: 8px; background-color: #171a21; color: white; text-align: center; font-size: 16px; }
        button.action-btn { padding: 15px 30px; background-color: #66c0f4; color: #1b2838; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-left: 10px; }
        .share-btn { background-color: #a4d007; color: #000000; width: 100%; margin-top: 20px; max-width: 800px;}
        #loading { display: none; margin: 20px 0; color: #66c0f4; font-weight: bold; font-size: 18px; }
        
        /* -------------------------------------- */
        /* 16:9 左右分區截圖專區 (分享圖卡核心)   */
        /* -------------------------------------- */
        #captureArea { 
            display: none; /* 由 JS 控制切換為 flex */
            background-color: #171a21; 
            padding: 30px; 
            border-radius: 16px; 
            margin-top: 20px; 
            border: 2px solid #3c5a73; 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 16 / 9; /* 強制 16:9 比例 */
            margin-left: auto; 
            margin-right: auto;
            box-sizing: border-box;
            gap: 25px;
            color: #c7d5e0;
        }
        
        /* 左半邊：文字數據區 */
        .capture-left { flex: 1.1; display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .title-box { margin-bottom: 15px; border-bottom: 2px solid #2a475e; padding-bottom: 10px; }
        .title-box h3 { color: #ffffff; margin: 0 0 5px 0; font-size: 24px; }
        .title-box p { color: #8f98a0; font-size: 14px; margin: 0; }
        
        .stats-list { background: #203345; padding: 15px; border-radius: 10px; font-size: 15px; border: 1px solid #2a475e; }
        .stats-list div { margin-bottom: 6px; border-bottom: 1px dashed #2a475e; padding-bottom: 6px; }
        .stats-list div:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .stats-list .highlight { color: #66c0f4; font-weight: bold; font-size: 17px;}
        .stats-divider { margin-top: 10px !important; border-top: 2px solid #2a475e !important; padding-top: 10px !important; }

        /* 右半邊：圖表標籤區 */
        .capture-right { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; background: #1b2838; border-radius: 12px; padding: 20px; border: 1px solid #2a475e; }
        .chart-container { width: 100%; flex: 1; position: relative; min-height: 0; } /* 確保 Canvas 縮放適應 */
        .tag-list { list-style: none; padding: 0; margin-top: 15px; margin-bottom: 10px; text-align: center;}
        .tag-list li { background: #2a475e; color: #ffffff; margin: 3px; padding: 5px 10px; border-radius: 6px; display: inline-block; font-size: 12px; }
        .watermark { text-align: center; color: #66c0f4; font-size: 11px; opacity: 0.7; }

        /* RWD 應對手機小螢幕 */
        @media (max-width: 768px) { 
            #captureArea { flex-direction: column; aspect-ratio: auto; }
            .board-container { flex-direction: column; } 
            input, button.action-btn { width: 100%; margin: 5px 0; } 
        }
        
        /* -------------------------------------- */
        /* 排行榜區塊設定                         */
        /* -------------------------------------- */
        .leaderboard-section { margin-top: 40px; background-color: #171a21; padding: 20px; border-radius: 16px; border: 1px solid #3c5a73; }
        .leaderboard-section h3 { font-size: 20px; color: #ffffff; margin-bottom: 15px; text-align: left; border-left: 4px solid #66c0f4; padding-left: 10px; }
        .board-container { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        .board { flex: 1; background: #203345; padding: 15px; border-radius: 10px; border: 1px solid #2a475e; }
        .board h4 { margin-top: 0; color: #e1e1e1; font-size: 16px; margin-bottom: 10px; text-align: center; }
        .table-wrapper { max-height: 300px; overflow-y: auto; }
        .board table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        .board th { color: #8f98a0; position: sticky; top: 0; background: #203345; padding: 8px 5px; border-bottom: 2px solid #2a475e; }
        .board td { padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎮 Steam 玩家性格分析</h2>
        <div class="input-group">
            <input type="text" id="steamId" placeholder="輸入 Steam ID">
            <button class="action-btn" onclick="analyze()">開始分析</button>
        </div>
        
        <div id="loading">🚀 正在讀取並生成高畫質圖卡，請稍候...</div>
        
        <div id="captureArea">
            <div class="capture-left">
                <div class="title-box">
                    <h3 id="playerTitle">🏆</h3>
                    <p id="playerDesc"></p>
                </div>
                <div class="stats-list">
                    <div>總遊玩時數：<span class="highlight" id="statTotalHours">0</span> 小時</div>
                    <div>精神時光屋：<span class="highlight" id="statTopGame">-</span> (<span class="highlight" id="statTopHours">0</span> h)</div>
                    <div class="stats-divider">擁有遊戲：<span class="highlight" id="statTotal">0</span> 款</div>
                    <div>0小時：<span class="highlight" id="statUnplayed">0</span> 款 (佔 <span id="statUnplayedPct">0</span>%)</div>
                    <div>小於兩小時：<span class="highlight" id="statUnder2">0</span> 款 (佔 <span id="statUnder2Pct">0</span>%)</div>
                    <div>大於兩小時：<span class="highlight" id="statOver2">0</span> 款 (佔 <span id="statOver2Pct">0</span>%)</div>
                </div>
            </div>
            
            <div class="capture-right">
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
                <ul id="tags" class="tag-list"></ul>
                <div class="watermark">由 Steam 性格分析器生成</div>
            </div>
        </div>

        <button id="downloadBtn" class="action-btn share-btn" style="display:none;" onclick="downloadCard()">📸 一鍵下載 16:9 分享圖卡</button>

        <div class="leaderboard-section">
            <h3>🔥 雙週排行榜 (近兩週活躍)</h3>
            <div class="board-container">
                <div class="board">
                    <h4>👤 個人雙週排行</h4>
                    <div class="table-wrapper"><table id="personalWeeklyBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table></div>
                </div>
                <div class="board">
                    <h4>🌍 全站雙週排行</h4>
                    <div class="table-wrapper"><table id="globalWeeklyBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table></div>
                </div>
            </div>
        </div>

        <div class="leaderboard-section">
            <h3>👑 歷史排行榜 (總時數累計)</h3>
            <div class="board-container">
                <div class="board">
                    <h4>👤 個人歷史排行</h4>
                    <div class="table-wrapper"><table id="personalHistoricalBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table></div>
                </div>
                <div class="board">
                    <h4>🌍 全站歷史排行</h4>
                    <div class="table-wrapper"><table id="globalHistoricalBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYDo2iArd_q3IvLCVC_P9xcN0VTIz_jO2jq8Q06EYip_F19J14SHgU1fliJBQcYr_gUw/exec";
        let myChart = null;

        // 獨立出抓取全站排行榜的功能，方便隨時刷新
        async function fetchGlobalRankings() {
            try {
                const res = await fetch(`${API_URL}?action=getRankings`);
                const data = await res.json();
                if(data.success) {
                    renderBoard('globalWeeklyBoard', data.weekly);
                    renderBoard('globalHistoricalBoard', data.historical);
                }
            } catch (e) { console.error("全站排行載入失敗", e); }
        }

        window.onload = fetchGlobalRankings;

        function renderBoard(tableId, list) {
            const table = document.getElementById(tableId);
            while(table.rows.length > 1) { table.deleteRow(1); }
            if(!list || list.length === 0) {
                const row = table.insertRow();
                row.innerHTML = `<td colspan="3" style="text-align:center; color: #8f98a0; padding: 15px;">尚無資料（請先進行一次分析）</td>`;
                return;
            }
            list.forEach((item, index) => {
                const row = table.insertRow();
                row.innerHTML = `<td>${index + 1}</td>
                                 <td style="max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.name}</td>
                                 <td style="color: #66c0f4;">${item.hours}h</td>`;
            });
        }

        async function analyze() {
            const steamId = document.getElementById('steamId').value.trim();
            if (!steamId) return alert("請輸入有效的 Steam ID");

            document.getElementById('loading').style.display = 'block';
            document.getElementById('captureArea').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}?steamId=${steamId}`);
                if (!response.ok) throw new Error("HTTP Error");
                const data = await response.json();

                if (data.success) {
                    document.getElementById('playerTitle').innerText = `🏆 ${data.stats.profile.title}`;
                    document.getElementById('playerDesc').innerText = data.stats.profile.description;
                    
                    document.getElementById('statTotalHours').innerText = data.stats.totalHours;
                    document.getElementById('statTopGame').innerText = data.libraryStats.topGame;
                    document.getElementById('statTopHours').innerText = data.libraryStats.topGameHours;
                    
                    document.getElementById('statTotal').innerText = data.libraryStats.total;
                    document.getElementById('statUnplayed').innerText = data.libraryStats.unplayed;
                    document.getElementById('statUnplayedPct').innerText = data.libraryStats.unplayedPercent;
                    
                    document.getElementById('statUnder2').innerText = data.libraryStats.under2Hours;
                    document.getElementById('statUnder2Pct').innerText = data.libraryStats.under2HoursPercent;
                    
                    document.getElementById('statOver2').innerText = data.libraryStats.over2Hours;
                    document.getElementById('statOver2Pct').innerText = data.libraryStats.over2HoursPercent;

                    if(data.personalRankings) {
                        renderBoard('personalWeeklyBoard', data.personalRankings.weekly);
                        renderBoard('personalHistoricalBoard', data.personalRankings.historical);
                    }

                    const tagsContainer = document.getElementById('tags');
                    tagsContainer.innerHTML = '';
                    const labels = [], chartData = [];
                    data.stats.topTags.forEach(t => {
                        const hours = Math.floor(t.playtime / 60);
                        tagsContainer.innerHTML += `<li>${t.tag}</li>`;
                        labels.push(t.tag); chartData.push(hours);
                    });

                    // 確保使用 flex 佈局顯示
                    document.getElementById('captureArea').style.display = 'flex';
                    document.getElementById('downloadBtn').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    
                    renderChart(labels, chartData);

                    // ★ 關鍵修正：分析完成後，自動刷新全站排行！
                    await fetchGlobalRankings();

                } else {
                    alert("❌ 分析失敗：" + data.error);
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                alert(`⚠️ 連線發生錯誤。`);
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type: 'radar', 
                data: { 
                    labels: labels, 
                    datasets: [{ data: data, backgroundColor: 'rgba(102, 192, 244, 0.4)', borderColor: 'rgba(102, 192, 244, 1)' }] 
                }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, /* 確保圖表填滿右側空間 */
                    scales: { r: { ticks: { display: false } } }, 
                    plugins: { legend: { display: false } } 
                } 
            });
        }

        function downloadCard() { 
            html2canvas(document.getElementById('captureArea'), { backgroundColor: "#171a21", scale: 2 }).then(canvas => { 
                const link = document.createElement('a'); 
                link.download = 'steam_profile_16x9.png'; 
                link.href = canvas.toDataURL("image/png"); 
                link.click(); 
            }); 
        }
    </script>
</body>
</html>
