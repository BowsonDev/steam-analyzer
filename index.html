<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 玩家性格分析與遊戲排行榜</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 基礎設定維持不變 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1b2838; color: #c7d5e0; text-align: center; padding: 20px; margin: 0; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background-color: #2a475e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
        h2 { color: #ffffff; margin-top: 0; font-size: 28px; letter-spacing: 1px; }
        .input-group { margin-bottom: 25px; }
        input { padding: 15px; width: 60%; box-sizing: border-box; border: 2px solid #171a21; border-radius: 8px; background-color: #171a21; color: white; text-align: center; font-size: 16px; }
        button.action-btn { padding: 15px 30px; background-color: #66c0f4; color: #1b2838; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-left: 10px; }
        .share-btn { background-color: #a4d007; color: #000000; width: 100%; margin-top: 20px;}
        #loading { display: none; margin: 20px 0; color: #66c0f4; font-weight: bold; font-size: 18px; }
        
        #captureArea { display: none; background-color: #171a21; padding: 30px; border-radius: 16px; margin-top: 20px; text-align: left; border: 1px solid #3c5a73; max-width: 500px; margin-left: auto; margin-right: auto; }
        .title-box { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #2a475e; padding-bottom: 15px; }
        .title-box h3 { color: #ffffff; margin: 0 0 10px 0; font-size: 26px; }
        
        /* 新版數據呈現 (依需求排列) */
        .stats-list { background: #203345; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 16px; color: #e1e1e1; border: 1px solid #2a475e; text-align: left; }
        .stats-list div { margin-bottom: 8px; border-bottom: 1px dashed #2a475e; padding-bottom: 8px; }
        .stats-list div:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .stats-list .highlight { color: #66c0f4; font-weight: bold; font-size: 18px;}

        .tag-list { list-style: none; padding: 0; margin-bottom: 25px; text-align: center;}
        .tag-list li { background: #2a475e; color: #ffffff; margin: 5px; padding: 8px 12px; border-radius: 6px; display: inline-block; font-size: 13px; }
        canvas { background-color: #1b2838; border-radius: 10px; padding: 15px; margin: 0 auto; display: block; border: 1px solid #2a475e;}
        
        /* 左右雙榜單區塊 */
        .leaderboard-section { margin-top: 40px; background-color: #171a21; padding: 20px; border-radius: 16px; border: 1px solid #3c5a73; }
        .leaderboard-section h3 { font-size: 20px; color: #ffffff; margin-bottom: 15px; text-align: left; border-left: 4px solid #66c0f4; padding-left: 10px; }
        .board-container { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .board-container { flex-direction: column; } input, button.action-btn { width: 100%; margin: 5px 0; } }
        .board { flex: 1; background: #203345; padding: 15px; border-radius: 10px; border: 1px solid #2a475e; }
        .board h4 { margin-top: 0; color: #e1e1e1; font-size: 16px; margin-bottom: 10px; text-align: center; }
        
        .table-wrapper { max-height: 300px; overflow-y: auto; }
        .board table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        .board th { color: #8f98a0; position: sticky; top: 0; background: #203345; padding: 8px 5px; border-bottom: 2px solid #2a475e; }
        .board td { padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎮 Steam 玩家性格分析</h2>
        <div class="input-group">
            <input type="text" id="steamId" placeholder="輸入 Steam ID">
            <button class="action-btn" onclick="analyze()">開始分析</button>
        </div>
        
        <div id="loading">🚀 正在解析，請稍候...</div>
        
        <div id="captureArea">
            <div class="title-box">
                <h3 id="playerTitle">🏆</h3>
                <p id="playerDesc"></p>
            </div>
            
            <div class="stats-list">
                <div>總遊玩時數：<span class="highlight" id="statTotalHours">0</span> 小時</div>
                <div>精神時光屋：<span class="highlight" id="statTopGame">-</span> (<span class="highlight" id="statTopHours">0</span> 小時)</div>
                <div style="margin-top: 15px; border-top: 2px solid #2a475e; padding-top: 15px;">擁有遊戲：<span class="highlight" id="statTotal">0</span> 款</div>
                <div>0小時：<span class="highlight" id="statUnplayed">0</span> 款 (佔 <span id="statUnplayedPct">0</span>%)</div>
                <div>小於兩小時：<span class="highlight" id="statUnder2">0</span> 款 (佔 <span id="statUnder2Pct">0</span>%)</div>
                <div>大於兩小時：<span class="highlight" id="statOver2">0</span> 款 (佔 <span id="statOver2Pct">0</span>%)</div>
            </div>
            
            <ul id="tags" class="tag-list"></ul>
            <canvas id="radarChart" width="400" height="400"></canvas>
        </div>

        <div style="max-width: 500px; margin: 0 auto;">
            <button id="downloadBtn" class="action-btn share-btn" style="display:none;" onclick="downloadCard()">📸 一鍵下載圖卡</button>
        </div>

        <div class="leaderboard-section">
            <h3>🔥 雙週排行榜 (近兩週活躍)</h3>
            <div class="board-container">
                <div class="board">
                    <h4>👤 個人雙週排行</h4>
                    <div class="table-wrapper">
                        <table id="personalWeeklyBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table>
                    </div>
                </div>
                <div class="board">
                    <h4>🌍 全站雙週排行</h4>
                    <div class="table-wrapper">
                        <table id="globalWeeklyBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table>
                    </div>
                </div>
            </div>
        </div>

        <div class="leaderboard-section">
            <h3>👑 歷史排行榜 (總時數累計)</h3>
            <div class="board-container">
                <div class="board">
                    <h4>👤 個人歷史排行</h4>
                    <div class="table-wrapper">
                        <table id="personalHistoricalBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table>
                    </div>
                </div>
                <div class="board">
                    <h4>🌍 全站歷史排行</h4>
                    <div class="table-wrapper">
                        <table id="globalHistoricalBoard"><tr><th>#</th><th>遊戲名稱</th><th>時數</th></tr></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYDo2iArd_q3IvLCVC_P9xcN0VTIz_jO2jq8Q06EYip_F19J14SHgU1fliJBQcYr_gUw/exec";
        let myChart = null;

        window.onload = async function() {
            try {
                const res = await fetch(`${API_URL}?action=getRankings`);
                const data = await res.json();
                if(data.success) {
                    renderBoard('globalWeeklyBoard', data.weekly);
                    renderBoard('globalHistoricalBoard', data.historical);
                }
            } catch (e) {}
        }

        function renderBoard(tableId, list) {
            const table = document.getElementById(tableId);
            // 清空舊資料只留標題列
            while(table.rows.length > 1) { table.deleteRow(1); }
            if(!list || list.length === 0) {
                const row = table.insertRow();
                row.innerHTML = `<td colspan="3" style="text-align:center;">尚無資料</td>`;
                return;
            }
            list.forEach((item, index) => {
                const row = table.insertRow();
                row.innerHTML = `<td>${index + 1}</td>
                                 <td style="max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.name}</td>
                                 <td style="color: #66c0f4;">${item.hours}h</td>`;
            });
        }

        async function analyze() {
            const steamId = document.getElementById('steamId').value.trim();
            if (!steamId) return alert("請輸入有效的 Steam ID");

            document.getElementById('loading').style.display = 'block';
            document.getElementById('captureArea').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';

            try {
                // 為了避免快取讀到舊版資料，可以在網址後加個隨機亂數強制重抓（如果需要的話，目前先照舊）
                const response = await fetch(`${API_URL}?steamId=${steamId}`);
                if (!response.ok) throw new Error("HTTP Error");
                const data = await response.json();

                if (data.success) {
                    document.getElementById('playerTitle').innerText = `🏆 ${data.stats.profile.title}`;
                    document.getElementById('playerDesc').innerText = data.stats.profile.description;
                    
                    // 綁定新結構的資料
                    document.getElementById('statTotalHours').innerText = data.stats.totalHours;
                    document.getElementById('statTopGame').innerText = data.libraryStats.topGame;
                    document.getElementById('statTopHours').innerText = data.libraryStats.topGameHours;
                    
                    document.getElementById('statTotal').innerText = data.libraryStats.total;
                    document.getElementById('statUnplayed').innerText = data.libraryStats.unplayed;
                    document.getElementById('statUnplayedPct').innerText = data.libraryStats.unplayedPercent;
                    
                    document.getElementById('statUnder2').innerText = data.libraryStats.under2Hours;
                    document.getElementById('statUnder2Pct').innerText = data.libraryStats.under2HoursPercent;
                    
                    document.getElementById('statOver2').innerText = data.libraryStats.over2Hours;
                    document.getElementById('statOver2Pct').innerText = data.libraryStats.over2HoursPercent;

                    // 渲染個人榜單 (左右對應的左邊)
                    if(data.personalRankings) {
                        renderBoard('personalWeeklyBoard', data.personalRankings.weekly);
                        renderBoard('personalHistoricalBoard', data.personalRankings.historical);
                    }

                    const tagsContainer = document.getElementById('tags');
                    tagsContainer.innerHTML = '';
                    const labels = [], chartData = [];
                    data.stats.topTags.forEach(t => {
                        const hours = Math.floor(t.playtime / 60);
                        tagsContainer.innerHTML += `<li>${t.tag}</li>`;
                        labels.push(t.tag); chartData.push(hours);
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('captureArea').style.display = 'block';
                    document.getElementById('downloadBtn').style.display = 'block';
                    renderChart(labels, chartData);
                } else {
                    alert("❌ 分析失敗：" + data.error);
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                alert(`⚠️ 發生錯誤：請確認後端已發布為「新版本」`);
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'radar', data: { labels: labels, datasets: [{ data: data, backgroundColor: 'rgba(102, 192, 244, 0.4)', borderColor: 'rgba(102, 192, 244, 1)' }] }, options: { scales: { r: { ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        }

        function downloadCard() { html2canvas(document.getElementById('captureArea'), { backgroundColor: "#171a21", scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = 'steam_profile.png'; link.href = canvas.toDataURL("image/png"); link.click(); }); }
    </script>
</body>
</html>
