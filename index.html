<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 玩家性格分析與排行榜</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1b2838; color: #c7d5e0; 
            text-align: center; padding: 20px; margin: 0;
        }
        .container { 
            max-width: 600px; margin: 0 auto; 
            background-color: #2a475e; padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        h2 { color: #ffffff; margin-top: 0; }
        input { 
            padding: 12px; width: 80%; box-sizing: border-box;
            border: none; border-radius: 6px; margin-bottom: 15px; 
            background-color: #171a21; color: white; text-align: center;
        }
        button { 
            padding: 12px 25px; background-color: #66c0f4; color: #1b2838; 
            border: none; border-radius: 6px; cursor: pointer; 
            font-weight: bold; font-size: 16px; width: 80%; margin-bottom: 10px;
        }
        button:hover { background-color: #4192c0; }
        .share-btn { background-color: #a4d007; color: #000000; }
        .share-btn:hover { background-color: #8cb906; }
        
        #loading { display: none; margin: 20px 0; color: #66c0f4; font-weight: bold; }
        
        /* 截圖專區 */
        #captureArea { 
            display: none; background-color: #171a21; padding: 20px; 
            border-radius: 12px; margin-top: 20px; text-align: left; 
            border: 2px solid #2a475e;
        }
        .title-box { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #2a475e; padding-bottom: 10px; }
        .title-box h3 { color: #ffffff; margin: 0 0 5px 0; font-size: 24px; }
        .title-box p { color: #8f98a0; font-size: 14px; margin: 0; }
        
        /* 硬核數據盤點區塊 */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #2a475e; padding: 15px; border-radius: 8px; margin-bottom: 15px;
            text-align: center; font-size: 13px; color: #e1e1e1;
        }
        .stats-grid div span { display: block; font-size: 18px; font-weight: bold; color: #66c0f4; margin-top: 4px; }
        .stats-full { grid-column: span 2; border-top: 1px solid #171a21; padding-top: 10px; margin-top: 5px; }

        .tag-list { list-style: none; padding: 0; margin-bottom: 20px; text-align: center;}
        .tag-list li { 
            background: #2a475e; color: #ffffff; margin: 4px; padding: 6px 10px; 
            border-radius: 4px; display: inline-block; font-size: 12px;
        }
        canvas { background-color: #1b2838; border-radius: 8px; padding: 10px; margin: 0 auto; display: block; }
        
        /* 排行榜區塊 */
        .leaderboard-section { margin-top: 40px; background-color: #171a21; padding: 20px; border-radius: 12px; }
        .board-container { display: flex; justify-content: space-between; gap: 15px; margin-top: 15px; }
        @media (max-width: 600px) { .board-container { flex-direction: column; } }
        .board { flex: 1; background: #2a475e; padding: 15px; border-radius: 8px; }
        .board h4 { margin-top: 0; color: #66c0f4; border-bottom: 1px solid #171a21; padding-bottom: 10px; }
        .board table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        .board th, .board td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .board th { color: #8f98a0; font-weight: normal; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎮 Steam 性格分析器</h2>
        <input type="text" id="steamId" placeholder="輸入 Steam ID (例如: 76561198201541689)">
        <br>
        <button onclick="analyze()">開始分析</button>
        
        <div id="loading">🚀 正在讀取龐大的遊戲庫資料，請稍候...</div>
        
        <div id="captureArea">
            <div class="title-box">
                <h3 id="playerTitle">🏆</h3>
                <p id="playerDesc"></p>
                <p id="totalHours" style="color: #66c0f4; font-weight: bold; margin-top: 10px;"></p>
            </div>
            
            <div class="stats-grid">
                <div>擁有遊戲<span><span id="statTotal">0</span> 款</span></div>
                <div>大於 2hr<span><span id="statPlayed">0</span> 款</span></div>
                <div class="stats-full">電子盆栽 (0hr)<span><span id="statUnplayed">0</span> 款 (<span id="statUnplayedPct">0</span>%)</span></div>
                <div class="stats-full">精神時光屋<span><span id="statTopGame">-</span><br>(佔總時數 <span id="statTopPct">0</span>%)</span></div>
            </div>
            
            <ul id="tags" class="tag-list"></ul>
            <canvas id="radarChart" width="400" height="400"></canvas>
            <div style="text-align: center; color: #66c0f4; font-size: 12px; margin-top: 10px;">由 Steam 性格分析器生成</div>
        </div>

        <button id="downloadBtn" class="share-btn" style="display:none; margin-top: 20px;" onclick="downloadCard()">📸 一鍵下載分享圖卡</button>

        <div class="leaderboard-section">
            <h3>🏆 全站戰力排行榜</h3>
            <div class="board-container">
                <div class="board">
                    <h4>🔥 每週爆肝榜 (近兩週)</h4>
                    <table id="weeklyBoard">
                        <tr><th>排名</th><th>ID</th><th>時數</th></tr>
                    </table>
                </div>
                <div class="board">
                    <h4>👑 歷史仙人榜 (總時數)</h4>
                    <table id="historicalBoard">
                        <tr><th>排名</th><th>ID</th><th>時數</th></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbypPWY30i-TMQ-Cwn09NJOe_88qIck_UFi_fIAVYxNrNtVTdJP33PU1Yvu4p7AvFY6Hxg/exec";
        let myChart = null;

        // 網頁載入時自動抓取排行榜
        window.onload = async function() {
            try {
                const res = await fetch(`${API_URL}?action=getRankings`);
                const data = await res.json();
                if(data.success) {
                    renderBoard('weeklyBoard', data.weekly);
                    renderBoard('historicalBoard', data.historical);
                }
            } catch (e) { console.error("排行榜載入失敗", e); }
        }

        function renderBoard(tableId, list) {
            const table = document.getElementById(tableId);
            list.forEach((item, index) => {
                const row = table.insertRow();
                row.innerHTML = `<td>${index + 1}</td>
                                 <td style="max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.steamId}</td>
                                 <td>${item.hours}h</td>`;
            });
        }

        async function analyze() {
            const steamId = document.getElementById('steamId').value.trim();
            if (!steamId) return alert("請輸入有效的 Steam ID");

            document.getElementById('loading').style.display = 'block';
            document.getElementById('captureArea').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}?steamId=${steamId}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('playerTitle').innerText = `🏆 ${data.stats.profile.title}`;
                    document.getElementById('playerDesc').innerText = data.stats.profile.description;
                    document.getElementById('totalHours').innerText = `總遊玩時數：${data.stats.totalHours} 小時`;
                    
                    // 填入硬核盤點數據
                    document.getElementById('statTotal').innerText = data.libraryStats.total;
                    document.getElementById('statPlayed').innerText = data.libraryStats.over2Hours;
                    document.getElementById('statUnplayed').innerText = data.libraryStats.unplayed;
                    document.getElementById('statUnplayedPct').innerText = data.libraryStats.unplayedPercent;
                    document.getElementById('statTopGame').innerText = data.libraryStats.topGame;
                    document.getElementById('statTopPct').innerText = data.libraryStats.topGamePercent;

                    const tagsContainer = document.getElementById('tags');
                    tagsContainer.innerHTML = '';
                    const labels = [], chartData = [];

                    data.stats.topTags.forEach(t => {
                        const hours = Math.floor(t.playtime / 60);
                        tagsContainer.innerHTML += `<li>${t.tag} (${hours} 小時)</li>`;
                        labels.push(t.tag); chartData.push(hours);
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('captureArea').style.display = 'block';
                    document.getElementById('downloadBtn').style.display = 'inline-block';
                    
                    renderChart(labels, chartData);
                } else {
                    alert("❌ 分析失敗：" + data.error);
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                alert("⚠️ 跨域安全阻擋，請確認網頁已部署至 GitHub Pages！");
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '遊玩時數 (小時)', data: data,
                        backgroundColor: 'rgba(102, 192, 244, 0.4)', borderColor: 'rgba(102, 192, 244, 1)',
                        pointBackgroundColor: '#ffffff', pointBorderColor: 'rgba(102, 192, 244, 1)', borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { color: '#c7d5e0', font: { size: 12 } },
                            ticks: { display: false, backdropColor: 'transparent' }
                        }
                    },
                    plugins: { legend: { display: false } }, animation: { duration: 0 }
                }
            });
        }

        function downloadCard() {
            html2canvas(document.getElementById('captureArea'), { backgroundColor: "#171a21", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'steam_profile.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
