<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam 玩家性格分析器</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* === 核心全域設定 (Steam 深色風格) === */
    body {
      background-color: #1b2838;
      color: #c7d5e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { color: #ffffff; text-align: center; margin-bottom: 5px; }
    .subtitle { color: #66c0f4; text-align: center; margin-top: 0; margin-bottom: 20px; }

    /* === 搜尋區塊 === */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 500px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 4px;
      background: #316282;
      color: white;
      font-size: 16px;
    }
    input[type="text"]::placeholder { color: #90b8d4; }
    button {
      padding: 12px 20px;
      background: linear-gradient(to right, #47bfff 5%, #1a44c2 60%);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }

    /* === 動畫與錯誤提示區 (方向 A 新增) === */
    #loadingZone { display: none; text-align: center; margin: 15px 0; width: 100%; max-width: 500px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(102, 192, 244, 0.3);
      border-top-color: #66c0f4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #errorZone {
      display: none; width: 100%; max-width: 500px; margin: 15px 0;
      background: rgba(255, 60, 60, 0.1); border: 1px solid #ff3c3c; border-radius: 8px; padding: 15px; box-sizing: border-box;
    }
    .help-accordion { background: rgba(0, 0, 0, 0.2); border-radius: 6px; overflow: hidden; margin-top: 10px; }
    .help-accordion summary { padding: 10px; color: #fff; cursor: pointer; font-weight: bold; list-style: none; text-align: center; }
    .help-accordion summary:hover { background: rgba(255, 255, 255, 0.1); }
    .help-content { padding: 15px; color: #ddd; font-size: 14px; line-height: 1.6; border-top: 1px solid rgba(255, 255, 255, 0.1); }
    .steam-link-btn {
      display: block; text-align: center; margin-top: 10px; padding: 10px;
      background: #2a475e; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;
    }
    .steam-link-btn:hover { background: #66c0f4; color: #1b2838; }

    /* === 分析結果圖卡區塊 (16:9 比例) === */
    #resultCard {
      display: none; /* 預設隱藏 */
      width: 800px;
      height: 450px; /* 16:9 比例 */
      background: linear-gradient(135deg, #2a475e 0%, #1b2838 100%);
      border: 2px solid #316282;
      border-radius: 12px;
      padding: 25px;
      box-sizing: border-box;
      color: white;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .card-layout { display: flex; height: 100%; gap: 20px; }
    
    .left-panel { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .title-box h2 { color: #66c0f4; font-size: 28px; margin: 0 0 10px 0; }
    .title-box p { font-size: 14px; color: #c7d5e0; line-height: 1.5; margin: 0; }
    
    .stats-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 14px; line-height: 1.8;}
    .stats-box span { color: #66c0f4; font-weight: bold; }
    
    .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .tag-badge { background: #316282; padding: 5px 10px; border-radius: 20px; font-size: 12px; }

    .right-panel { flex: 1; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 8px; }
    
    /* === 動作按鈕 === */
    #actionButtons { display: none; margin-top: 20px; gap: 15px; }
    .btn-download { background: #66c0f4; color: #1b2838; }

    /* 響應式：手機版縮放 */
    @media (max-width: 820px) {
      #resultCard { transform: scale(0.45); transform-origin: top center; margin-bottom: -200px; }
    }
  </style>
</head>
<body>

  <h1>Steam 性格分析器</h1>
  <p class="subtitle">輸入自訂網址或 17 位 SteamID 產生專屬圖卡</p>

  <div class="search-box">
    <input type="text" id="steamIdInput" placeholder="例如: gaben 或 76561197960287930">
    <button onclick="analyzePlayer()">開始分析</button>
  </div>

  <div id="loadingZone">
    <div class="spinner"></div>
    <p style="color: #66c0f4; margin-top: 10px;">機器人潛入遊戲庫中，請稍候...</p>
  </div>

  <div id="errorZone">
    <p id="errorMessage" style="color: #ff3c3c; font-weight: bold; margin-bottom: 10px;">❌ 讀取失敗</p>
    <details class="help-accordion">
      <summary>🛠️ 帳號未公開？點我查看 3 秒解鎖教學</summary>
      <div class="help-content">
        <p>1. 前往 Steam 網頁版並登入。</p>
        <p>2. 點擊右上角頭像進入「編輯個人檔案」 &rarr;「隱私設定」。</p>
        <p>3. 將「遊戲詳情」狀態改為<strong>「公開」</strong>。</p>
        <a href="https://steamcommunity.com/my/edit/settings" target="_blank" class="steam-link-btn">👉 點我直接前往 Steam 設定頁面</a>
        <button onclick="analyzePlayer()" style="width: 100%; margin-top:10px; background: #66c0f4; color: #1b2838;">我改好了，重新分析！</button>
      </div>
    </details>
  </div>

  <div id="resultCard">
    <div class="card-layout">
      <div class="left-panel">
        <div class="title-box">
          <h2 id="cardTitle">稱號載入中...</h2>
          <p id="cardDesc">敘述載入中...</p>
        </div>
        
        <div class="stats-box">
          總遊玩時數：<span id="statTotalHours">0</span> hr<br>
          精神時光屋：<span id="statTopGame">無</span> (<span id="statTopGameHours">0</span> hr)<br>
          庫存總數：<span id="statTotalGames">0</span> 款<br>
          完全沒玩過：<span id="statUnplayed">0</span> 款
        </div>

        <div class="tags-container" id="tagsContainer">
          </div>
      </div>
      
      <div class="right-panel">
        <canvas id="radarChart"></canvas>
      </div>
    </div>
  </div>

  <div id="actionButtons">
    <button class="btn-download" onclick="downloadCard()">📸 下載性格圖卡</button>
  </div>

  <script>
    // ★★★ 請將這裡換成你的 Google Apps Script 網頁應用程式 URL ★★★
    const GAS_API_URL = "在此貼上你的_GAS_網頁部署網址"; 
    
    let radarChartInstance = null; // 存放圖表實例以供更新

    async function analyzePlayer() {
      const inputId = document.getElementById("steamIdInput").value.trim();
      if (!inputId) return alert("請輸入 Steam ID！");

      // UI 切換：顯示動畫，隱藏卡片與錯誤區
      document.getElementById("loadingZone").style.display = "block";
      document.getElementById("resultCard").style.display = "none";
      document.getElementById("actionButtons").style.display = "none";
      document.getElementById("errorZone").style.display = "none";

      try {
        // 呼叫你的 GAS 後端
        const response = await fetch(`${GAS_API_URL}?steamId=${inputId}`);
        const data = await response.json();

        // 隱藏動畫
        document.getElementById("loadingZone").style.display = "none";

        if (data.success) {
          // 渲染資料到畫面上
          renderCard(data);
          document.getElementById("resultCard").style.display = "block";
          document.getElementById("actionButtons").style.display = "flex";
        } else {
          // 顯示錯誤與教學摺疊區
          document.getElementById("errorZone").style.display = "block";
          document.getElementById("errorMessage").innerText = "❌ " + (data.error || "讀取失敗，可能是帳號未公開。");
        }
      } catch (err) {
        document.getElementById("loadingZone").style.display = "none";
        document.getElementById("errorZone").style.display = "block";
        document.getElementById("errorMessage").innerText = "❌ 網路連線錯誤，請稍後再試。";
      }
    }

    function renderCard(data) {
      // 1. 填入稱號與敘述
      document.getElementById("cardTitle").innerText = "🏆 " + data.stats.profile.title;
      document.getElementById("cardDesc").innerText = data.stats.profile.description;

      // 2. 填入數據
      document.getElementById("statTotalHours").innerText = data.stats.totalHours;
      document.getElementById("statTopGame").innerText = data.libraryStats.topGame;
      document.getElementById("statTopGameHours").innerText = data.libraryStats.topGameHours;
      document.getElementById("statTotalGames").innerText = data.totalGamesCount;
      document.getElementById("statUnplayed").innerText = data.libraryStats.unplayed;

      // 3. 填入十大子標籤
      const tagsBox = document.getElementById("tagsContainer");
      tagsBox.innerHTML = "";
      data.stats.topTags.forEach(tagObj => {
        let span = document.createElement("span");
        span.className = "tag-badge";
        span.innerText = tagObj.tag;
        tagsBox.appendChild(span);
      });

      // 4. 繪製六角雷達圖
      const radarLabels = data.stats.radarData.map(item => item.category);
      const radarValues = data.stats.radarData.map(item => item.hours);
      
      const ctx = document.getElementById('radarChart').getContext('2d');
      if (radarChartInstance) radarChartInstance.destroy(); // 清除舊圖表

      radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: radarLabels,
          datasets: [{
            label: '遊玩時數',
            data: radarValues,
            backgroundColor: 'rgba(102, 192, 244, 0.4)',
            borderColor: '#66c0f4',
            pointBackgroundColor: '#fff',
            borderWidth: 2
          }]
        },
        options: {
          scales: {
            r: {
              angleLines: { color: 'rgba(255, 255, 255, 0.2)' },
              grid: { color: 'rgba(255, 255, 255, 0.2)' },
              pointLabels: { color: '#c7d5e0', font: { size: 14 } },
              ticks: { display: false } // 隱藏內圈數字
            }
          },
          plugins: { legend: { display: false } } // 隱藏圖例
        }
      });
    }

    // 將 16:9 卡片截圖下載
    function downloadCard() {
      const card = document.getElementById("resultCard");
      html2canvas(card, { backgroundColor: "#1b2838", scale: 2 }).then(canvas => {
        let link = document.createElement('a');
        link.download = 'steam-profile.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
